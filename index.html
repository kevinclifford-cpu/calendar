<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Calendar</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 12px;
    background: #f4f4f4;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  button {
    padding: 8px 14px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #2d89ef;
    color: white;
  }

  .title {
    font-size: 20px;
    font-weight: bold;
  }

  .calendar-box {
    background: white;
    border-radius: 10px;
    padding: 12px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th, td {
    text-align: center;
    padding: 10px 4px;
    font-size: 14px;
  }

  th {
    color: #666;
  }

  td {
    border-radius: 6px;
    cursor: pointer;
  }

  td:hover {
    background: #e8f1ff;
  }

  .empty {
    background: transparent;
    cursor: default;
  }
</style>
</head>
<body>

  <div class="topbar">
    <button onclick="changeMonth(-1)">◀ Prev</button>
    <div class="title" id="monthTitle"></div>
    <button onclick="changeMonth(1)">Next ▶</button>
  </div>

  <div class="calendar-box">
    <table id="calendar"></table>
  </div>

<script>
  let currentDate = new Date();

  const monthNames = [
    "January", "February", "March", "April", "May", "June",
    "July", "August", "September", "October", "November", "December"
  ];

  function renderCalendar() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();

    document.getElementById("monthTitle").innerText =
      monthNames[month] + " " + year;

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    let html = "<tr>";
    const weekdays = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
    for (let day of weekdays) {
      html += `<th>${day}</th>`;
    }
    html += "</tr><tr>";

    for (let i = 0; i < firstDay; i++) {
      html += `<td class="empty"></td>`;
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const cellIndex = firstDay + d - 1;
      if (cellIndex % 7 === 0 && d !== 1) {
        html += "</tr><tr>";
      }

      html += `<td onclick="selectDate(${year}, ${month + 1}, ${d})">${d}</td>`;
    }

    html += "</tr>";
    document.getElementById("calendar").innerHTML = html;
  }

  function changeMonth(step) {
    currentDate.setMonth(currentDate.getMonth() + step);
    renderCalendar();
  }

  function selectDate(y, m, d) {
    const selected = `${y}-${String(m).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
    alert("Selected: " + selected);

    if (window.ReactNativeWebView) {
      window.ReactNativeWebView.postMessage(selected);
    }
  }

  renderCalendar();
</script>

</body>
</html>
